name: kamer_sync
description: "Cameroon National Land Ownership Management and Verification System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  animations: ^2.0.11
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  fl_chart: ^0.69.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.1

  # File & Document Management
  file_picker: ^6.2.1          # Downgraded
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  open_file: ^3.5.7
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2   # Downgraded to compatible version

  # AI Chatbot
  google_generative_ai: ^0.4.6

  # Crypto / Blockchain simulation
  crypto: ^3.0.5

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  logger: ^2.4.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.2
  flutter_dotenv: ^5.2.1
  qr_flutter: ^4.1.0
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0          # Downgraded to stable
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  # No assets or fonts declared to avoid missing file errors
  # Add them later when folders exist